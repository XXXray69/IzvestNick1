<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IzvestNick</title>
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f3f5fb;color:#111827}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .grid{display:grid;grid-template-columns:340px 1fr;gap:16px;height:calc(100vh - 40px)}
    .card{background:#fff;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:16px;overflow:hidden}
    h1,h2,h3{margin:0 0 12px}
    input,button,textarea,select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #d1d5db;box-sizing:border-box;font-size:14px}
    button{cursor:pointer;background:#111827;color:#fff;border:none}
    button.secondary{background:#eef2ff;color:#111827}
    .stack{display:flex;flex-direction:column;gap:10px}
    .row{display:flex;gap:8px}
    .row>*{flex:1}
    .hidden{display:none}
    .chat-item{padding:12px;border-radius:14px;background:#f9fafb;cursor:pointer;border:1px solid transparent}
    .chat-item.active{background:#eef2ff;border-color:#c7d2fe}
    .msgs{height:58vh;overflow:auto;background:#f9fafb;border-radius:16px;padding:12px}
    .msg{max-width:70%;padding:10px 12px;border-radius:16px;margin:8px 0}
    .msg.me{background:#111827;color:#fff;margin-left:auto}
    .msg.them{background:#e5e7eb;color:#111827}
    .small{font-size:12px;color:#6b7280}
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .pill{padding:6px 10px;background:#eef2ff;border-radius:999px;display:inline-block;font-size:12px}
    @media (max-width: 900px){.grid{grid-template-columns:1fr;height:auto}.msgs{height:40vh}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>IzvestNick</h1>
      <div class="small">Быстрый веб-клиент для теста backend на Render</div>
    </div>
    <div class="pill" id="statusPill">Не авторизован</div>
  </div>

  <div id="authView" class="grid" style="grid-template-columns:1fr 1fr;">
    <div class="card stack">
      <h2>Вход</h2>
      <input id="loginPhone" placeholder="Номер телефона, например 9991234567" />
      <input id="loginPassword" type="password" placeholder="Пароль" />
      <button onclick="login()">Войти</button>
      <div class="small" id="loginResult"></div>
    </div>
    <div class="card stack">
      <h2>Создать аккаунт</h2>
      <div class="row">
        <select id="regPrefix">
          <option>+7</option><option>+1</option><option>+44</option><option>+49</option><option>+33</option><option>+81</option>
        </select>
        <input id="regPhone" placeholder="Номер" />
      </div>
      <input id="regPassword" type="password" placeholder="Пароль" />
      <input id="regPassword2" type="password" placeholder="Подтвердить пароль" />
      <button onclick="register()">Создать аккаунт</button>
      <div class="small" id="registerResult"></div>
      <hr style="width:100%;border:none;border-top:1px solid #e5e7eb"/>
      <h3>После регистрации</h3>
      <input id="profileUserId" placeholder="user_id из ответа регистрации" />
      <div class="row">
        <input id="firstName" placeholder="Имя" />
        <input id="lastName" placeholder="Фамилия" />
      </div>
      <button class="secondary" onclick="completeProfile()">Сохранить имя и фамилию</button>
      <div class="small" id="profileResult"></div>
    </div>
  </div>

  <div id="appView" class="grid hidden">
    <div class="card stack">
      <div>
        <h2>Чаты</h2>
        <div class="small" id="meInfo"></div>
      </div>
      <button class="secondary" onclick="loadChats()">Обновить список чатов</button>
      <div class="row">
        <input id="targetUserId" placeholder="user_id собеседника" />
        <button onclick="createDirectChat()">Создать чат</button>
      </div>
      <div id="chatList" class="stack"></div>
      <button onclick="logout()">Выйти</button>
    </div>

    <div class="card stack">
      <div>
        <h2 id="chatTitle">Выбери чат</h2>
        <div class="small" id="chatMeta"></div>
      </div>
      <div id="messages" class="msgs"></div>
      <div class="row">
        <textarea id="messageText" placeholder="Напиши сообщение" rows="3"></textarea>
      </div>
      <div class="row">
        <button onclick="sendMessage()">Отправить</button>
        <button class="secondary" onclick="loadMessages()">Обновить сообщения</button>
      </div>
      <div class="small">Для второго пользователя открой сайт в режиме инкогнито или в другом браузере.</div>
    </div>
  </div>
</div>
<script>
const api = '/api/v1';
let token = localStorage.getItem('access_token') || '';
let currentChatId = null;
let ws = null;

async function apiFetch(path, options={}) {
  const headers = options.headers || {};
  if (token) headers['Authorization'] = `Bearer ${token}`;
  if (!(options.body instanceof FormData) && !headers['Content-Type']) headers['Content-Type']='application/json';
  const res = await fetch(path, {...options, headers});
  const text = await res.text();
  let data;
  try { data = text ? JSON.parse(text) : {}; } catch { data = {raw:text}; }
  if (!res.ok) throw new Error(data.detail || data.raw || res.statusText);
  return data;
}

function setStatus(text){ document.getElementById('statusPill').textContent=text; }
function showApp(show){ document.getElementById('authView').classList.toggle('hidden', show); document.getElementById('appView').classList.toggle('hidden', !show); }

async function register(){
  try{
    const data = await apiFetch(`${api}/auth/register`, {method:'POST', body: JSON.stringify({
      phone_prefix: regPrefix.value, phone_number: regPhone.value, password: regPassword.value, confirm_password: regPassword2.value
    })});
    registerResult.textContent = 'Успех. user_id = ' + data.user_id;
    profileUserId.value = data.user_id;
  }catch(e){ registerResult.textContent = e.message; }
}

async function completeProfile(){
  try{
    const fd = new FormData();
    fd.append('user_id', profileUserId.value);
    fd.append('first_name', firstName.value);
    fd.append('last_name', lastName.value);
    const res = await fetch(`${api}/auth/complete-profile`, {method:'POST', body: fd});
    const data = await res.json();
    if(!res.ok) throw new Error(data.detail || 'Ошибка');
    profileResult.textContent = `Профиль сохранён: ${data.first_name} ${data.last_name}`;
  }catch(e){ profileResult.textContent = e.message; }
}

async function login(){
  try{
    const data = await apiFetch(`${api}/auth/login`, {method:'POST', body: JSON.stringify({
      phone_number: loginPhone.value, password: loginPassword.value, device_name: 'Browser'
    })});
    token = data.access_token;
    localStorage.setItem('access_token', token);
    setStatus('Авторизован');
    showApp(true);
    await loadMe();
    await loadChats();
  }catch(e){ loginResult.textContent = e.message; }
}

async function loadMe(){
  try{ const me = await apiFetch(`${api}/users/me`); meInfo.textContent = `${me.first_name} ${me.last_name} · ${me.phone_prefix}${me.phone_number}`; }
  catch(e){ meInfo.textContent = e.message; }
}

async function loadChats(){
  try{
    const chats = await apiFetch(`${api}/chats`);
    chatList.innerHTML = '';
    chats.forEach(c => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (currentChatId===c.id ? ' active':'');
      const names = (c.members||[]).map(m => `${m.first_name} ${m.last_name}`.trim()).join(', ');
      item.innerHTML = `<strong>${c.title || (c.is_direct ? 'Личный чат' : 'Чат')}</strong><div class="small">${names}</div><div class="small">ID: ${c.id}</div>`;
      item.onclick = () => openChat(c.id, names || ('Chat '+c.id));
      chatList.appendChild(item);
    });
  }catch(e){ chatList.innerHTML = `<div class="small">${e.message}</div>`; }
}

async function createDirectChat(){
  try{
    await apiFetch(`${api}/chats/direct`, {method:'POST', body: JSON.stringify({user_id: Number(targetUserId.value)})});
    await loadChats();
  }catch(e){ alert(e.message); }
}

async function openChat(id, title){
  currentChatId = id;
  chatTitle.textContent = title || ('Chat '+id);
  chatMeta.textContent = 'chat_id: ' + id;
  await loadChats();
  await loadMessages();
  connectWs(id);
}

async function loadMessages(){
  if(!currentChatId) return;
  try{
    const msgs = await apiFetch(`${api}/messages/${currentChatId}`);
    messages.innerHTML = '';
    msgs.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg ' + (m.sender_id ? 'them':'' );
      apiFetch(`${api}/users/me`).then(me => { if (m.sender_id === me.id) div.className = 'msg me'; else div.className = 'msg them'; }).catch(()=>{});
      div.innerHTML = `<div>${escapeHtml(m.body)}</div><div class="small">message_id: ${m.id}</div>`;
      messages.appendChild(div);
    });
    messages.scrollTop = messages.scrollHeight;
  }catch(e){ messages.innerHTML = `<div class="small">${e.message}</div>`; }
}

async function sendMessage(){
  if(!currentChatId) return alert('Сначала выбери чат');
  try{
    await apiFetch(`${api}/messages/${currentChatId}`, {method:'POST', body: JSON.stringify({body: messageText.value})});
    messageText.value='';
    await loadMessages();
  }catch(e){ alert(e.message); }
}

function connectWs(chatId){
  if(ws) ws.close();
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/chats/${chatId}`);
  ws.onmessage = (event) => {
    try{
      const data = JSON.parse(event.data);
      if(data.event === 'new_message' || data.event === 'message_deleted') loadMessages();
    }catch{}
  };
}

function logout(){ localStorage.removeItem('access_token'); token=''; currentChatId=null; if(ws) ws.close(); setStatus('Не авторизован'); showApp(false); }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

if(token){ setStatus('Авторизован'); showApp(true); loadMe(); loadChats(); }
</script>
</body>
</html>
