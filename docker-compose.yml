version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: izvestnick
      POSTGRES_PASSWORD: izvestnick
      POSTGRES_DB: izvestnick
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    working_dir: /app
    command: bash -lc "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    ports:
      - '8000:8000'
    depends_on:
      - db

volumes:
  pg_data:
