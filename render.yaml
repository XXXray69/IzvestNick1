services:
  - type: web
    name: aurora-messenger-mvp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./aurora.db
      - key: CORS_ORIGINS
        value: https://aurora-messenger-mvp.onrender.com,http://localhost:3000,http://127.0.0.1:3000
